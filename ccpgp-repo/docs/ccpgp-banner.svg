<svg viewBox="0 0 720 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2e75b6"/>
      <stop offset="100%" style="stop-color:#4a9eda"/>
    </linearGradient>
  </defs>
  <rect width="720" height="200" rx="12" fill="url(#bg)"/>
  <!-- Neural network dots -->
  <circle cx="80" cy="60" r="6" fill="#2e75b6" opacity="0.6"/>
  <circle cx="80" cy="100" r="6" fill="#2e75b6" opacity="0.6"/>
  <circle cx="80" cy="140" r="6" fill="#2e75b6" opacity="0.6"/>
  <circle cx="160" cy="80" r="8" fill="#4a9eda" opacity="0.7"/>
  <circle cx="160" cy="120" r="8" fill="#4a9eda" opacity="0.7"/>
  <circle cx="240" cy="100" r="7" fill="#2e75b6" opacity="0.6"/>
  <!-- Connections -->
  <line x1="86" y1="60" x2="152" y2="80" stroke="#2e75b6" stroke-width="1.2" opacity="0.4"/>
  <line x1="86" y1="60" x2="152" y2="120" stroke="#2e75b6" stroke-width="1.2" opacity="0.3"/>
  <line x1="86" y1="100" x2="152" y2="80" stroke="#4a9eda" stroke-width="1.5" opacity="0.5"/>
  <line x1="86" y1="100" x2="152" y2="120" stroke="#4a9eda" stroke-width="1.5" opacity="0.5"/>
  <line x1="86" y1="140" x2="152" y2="120" stroke="#2e75b6" stroke-width="1.2" opacity="0.4"/>
  <line x1="86" y1="140" x2="152" y2="80" stroke="#2e75b6" stroke-width="0.8" opacity="0.2"/>
  <line x1="168" y1="80" x2="233" y2="100" stroke="#4a9eda" stroke-width="1.5" opacity="0.5"/>
  <line x1="168" y1="120" x2="233" y2="100" stroke="#4a9eda" stroke-width="1.5" opacity="0.5"/>
  <!-- Blocked connection (constitutional constraint) -->
  <line x1="86" y1="140" x2="233" y2="100" stroke="#e74c3c" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,4"/>
  <text x="148" y="148" font-family="monospace" font-size="8" fill="#e74c3c" opacity="0.7">blocked</text>
  <!-- Title -->
  <text x="300" y="72" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white" letter-spacing="3">CCPGP</text>
  <text x="300" y="105" font-family="Arial, sans-serif" font-size="14" fill="#8899aa">Constitutionally Constrained</text>
  <text x="300" y="125" font-family="Arial, sans-serif" font-size="14" fill="#8899aa">Provenance-Gated Plasticity</text>
  <rect x="300" y="138" width="280" height="1" fill="url(#accent)" opacity="0.5"/>
  <text x="300" y="160" font-family="Arial, sans-serif" font-size="11" fill="#667788">A synaptic learning rule for ethically bounded adaptive systems</text>
  <text x="300" y="180" font-family="Arial, sans-serif" font-size="10" fill="#556677">LEAP A.I Industries Ltd. · Apache 2.0 · Zero Dependencies</text>
</svg>
